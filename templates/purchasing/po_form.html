{% extends "base.html" %}
{% block title %}طلب شراء جديد{% endblock %}
{% block content %}
<div class="page-header"><span class="ph-icon">📋</span><div><h1>إنشاء طلب شراء جديد</h1></div></div>
<div class="card"><div class="card-body p-4">
  <form method="post">{% csrf_token %}
    <div class="row g-3 mb-4">
      <div class="col-md-4"><label class="form-label">المورد ★</label>
        <select name="supplier" class="form-select" required>
          <option value="">-- اختر --</option>
          {% for s in suppliers %}<option value="{{ s.pk }}">{{ s.code }} — {{ s.name }}</option>{% endfor %}
        </select>
      </div>
      <div class="col-md-3"><label class="form-label">الأولوية</label>
        <select name="priority" class="form-select"><option>عادي</option><option>عاجل</option><option>مستعجل</option></select>
      </div>
      <div class="col-md-5"><label class="form-label">تاريخ التسليم المتوقع</label><input type="date" name="expected_delivery" class="form-control"></div>
      <div class="col-12"><label class="form-label">ملاحظات / مبرر الطلب</label><textarea name="notes" class="form-control" rows="2"></textarea></div>
    </div>
    <h6 class="fw-bold mb-3 border-bottom pb-2">المواد المطلوبة</h6>
    {% for p in products %}
    <div class="row g-2 mb-2 align-items-center">
      <div class="col-md-5"><div class="d-flex align-items-center gap-2"><code class="badge bg-secondary">{{ p.code }}</code><span>{{ p.name }}</span><small class="text-muted">({{ p.unit.symbol }})</small></div></div>
      <div class="col-md-3"><input type="number" name="qty" class="form-control form-control-sm" min="0" step="0.01" value="0" placeholder="الكمية"><input type="hidden" name="product_id" value="{{ p.pk }}"></div>
      <div class="col-md-4"><div class="input-group input-group-sm"><input type="number" name="price" class="form-control" min="0" step="0.01" value="0" placeholder="سعر تقديري"><span class="input-group-text">دج</span></div></div>
    </div>
    {% endfor %}
    <div class="mt-4 d-flex gap-2"><button type="submit" class="btn btn-primary px-4"><i class="bi bi-send"></i> إرسال الطلب</button><a href="{% url 'purchasing:list' %}" class="btn btn-outline-secondary">إلغاء</a></div>
  </form>
</div></div>
{% endblock %}
