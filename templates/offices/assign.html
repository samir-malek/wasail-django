{% extends "base.html" %}
{% block title %}تعيين مسؤول{% endblock %}
{% block content %}
<div class="page-header"><span class="ph-icon">👔</span><div><h1>تعيين مسؤول لمكتب</h1></div></div>
<div class="card" style="max-width:700px"><div class="card-body p-4">
  <form method="post">{% csrf_token %}
    <div class="row g-3">
      <div class="col-12"><label class="form-label">المكتب ★</label>
        <select name="office" class="form-select" required>
          <option value="">-- اختر المكتب --</option>
          {% for o in offices %}<option value="{{ o.pk }}" {% if request.GET.office == o.pk|stringformat:"s" %}selected{% endif %}>{{ o.code }} — {{ o.name }}</option>{% endfor %}
        </select>
      </div>
      <div class="col-md-6"><label class="form-label">اسم المسؤول ★</label><input type="text" name="manager_name" class="form-control" required></div>
      <div class="col-md-6"><label class="form-label">الصفة / المنصب ★</label><input type="text" name="manager_title" class="form-control" required placeholder="رئيس مصلحة..."></div>
      <div class="col-md-6"><label class="form-label">الهاتف</label><input type="text" name="manager_phone" class="form-control"></div>
      <div class="col-md-6"><label class="form-label">البريد</label><input type="email" name="manager_email" class="form-control"></div>
      <div class="col-md-6"><label class="form-label">تاريخ التعيين ★</label><input type="date" name="start_date" class="form-control" required></div>
    </div>
    <div class="alert alert-info mt-3 py-2"><i class="bi bi-info-circle"></i> سيُنهى تلقائياً تعيين المسؤول الحالي عند الحفظ</div>
    <div class="mt-3 d-flex gap-2"><button type="submit" class="btn btn-primary px-4">✅ تعيين</button><a href="{% url 'offices:managers' %}" class="btn btn-outline-secondary">إلغاء</a></div>
  </form>
</div></div>
{% endblock %}
